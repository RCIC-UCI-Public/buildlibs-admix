---
system:
  - numactl
  - numactl-devel
  - hwloc-devel
  - libibverbs-devel
  - libpciaccess-devel
  - libtool
  - autoconf
  - automake
  - bzip2-devel
bootstrap:
  - !OScmp "<, 10, ucx, ucx-patched"
  - ucx-module
build:
manifest:
  - "{{build}}"
  - "{{bootstrap}}"
  - "{{system}}"
sets:
  - base
  - system
  - gcc6
  - gcc8
  - intel2022
  - "2022"
  - "2023"
  - "2024"
  - "2026"
