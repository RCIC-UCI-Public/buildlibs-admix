!include packages.yaml
---
versions: versions-base.yaml
bootstrap:
  - !eval "'ucx' if {{site.os_release}} <= 9 else 'ucx-patched'"
  - ucx-module
  - llvm
  - llvm-module
  - openmpi
  - openmpi-module
build:
  - boost
  - boost-module
  - fftw
  - fftw-module
  - mpich
  - mpich-module
  - geos
  - geos-module
  - scalapack
  - scalapack-module
  - lapack
  - lapack-module
manifest:
  - "{{build}}"
  - "{{bootstrap}}"
